version: '3'

services:

  frontend:
    image: nginx:latest

    container_name: frontend-container

    ports:
      - "80:80"

    volumes:
      - ./frontend:/usr/share/nginx/html

      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - backend

    networks:
      - app-network

  backend:
    build: ./backend

    container_name: backend-container

    restart: always

    depends_on:
      - mongo

    networks:
      - app-network

  mongo:
    image: mongo:4.0

    container_name: mongo-container

    restart: always

    volumes:
      - mongo-data:/data/db

    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
